# Adição ao docker-compose.yml do Grupo Win
# Copiar o bloco "grupowin-api" para dentro de /opt/grupowin/docker-compose.yml
# na seção "services:", antes do fechamento do arquivo.

services:
  grupowin-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: grupowin-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:38000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@grupowin-postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://grupowin-redis:6379/2
    networks:
      - grupowin-net
    depends_on:
      grupowin-postgres:
        condition: service_healthy
      grupowin-redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
